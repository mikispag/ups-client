# ups-client example configuration.
#
# Copy to /etc/ups-client/config.yaml and edit. All durations accept Go's
# time.ParseDuration syntax (e.g. 2s, 500ms, 1m).

nut:
  # host:port of upsd. Default port is 3493.
  address: 127.0.0.1:3493
  # The UPS section name as configured in /etc/nut/ups.conf (e.g. [myups] -> "myups").
  ups: ups
  # Authentication is only required for SET/INSTCMD/PRIMARY. For read-only
  # monitoring against a default upsd, leave both empty.
  username: ""
  password: ""
  # Per-request read/write deadline.
  timeout: 5s
  # tls:
  #   enable: true
  #   ca_file: /etc/ssl/upsd-ca.pem
  #   server_name: upsd.example
  #   insecure_skip_verify: false

monitor:
  # ups.status polling cadence. Match upsd's pollinterval (default 2s) or go
  # slightly slower; do not go below 500ms.
  status_interval: 2s
  # Bulk LIST VAR refresh cadence. Used to keep snapshot metadata
  # (battery.charge, runtime, load, etc.) fresh.
  snapshot_interval: 30s
  # Sustained communication-bad time after which NOCOMM fires. Set to 0 to disable.
  nocomm_threshold: 60s
  # Hold the RB token this long before emitting REPLBATT. APC BX-series
  # firmwares are known to flap; 600s smooths that out.
  replbatt_debounce: 600s
  # Hold the ALARM token this long before emitting ALARM. APC BX-series
  # firmwares assert brief (sub-minute) ALARMs during periodic background
  # self-tests; 60s suppresses those without delaying real alarms much.
  # When ALARM is confirmed, ups.alarm is fetched and surfaced via {{.Alarm}}.
  alarm_debounce: 60s
  # Initial reconnect backoff (caps at 30s).
  reconnect_backoff: 1s

notifications:
  # Each entry can include an optional `events:` list. Empty == every event.
  # Available events:
  #   STARTUP, ONLINE, ONBATT, LOWBATT, FSD, REPLBATT,
  #   COMMBAD, COMMOK, NOCOMM,
  #   BYPASS, NOTBYPASS, OVERLOAD, NOTOVERLOAD,
  #   TRIM, NOTTRIM, BOOST, NOTBOOST,
  #   CAL, NOTCAL, OFF, NOTOFF, ALARM, NOTALARM
  #
  # Templates use Go text/template against the TemplateData type. The big
  # if/else chain on .Event is duplicated across notifiers because each
  # field is its own template — keep them in sync if you add a new event.

  shell:
    # journald-friendly log line, emoji-prefixed for fast visual scan in
    # `journalctl -u ups-client -f`.
    - name: log
      command: /usr/bin/logger
      args:
        - "-t"
        - "ups-client"
        - >-
          {{- if eq .Event "ONLINE" }}🟢
          {{- else if eq .Event "ONBATT" }}🔌
          {{- else if eq .Event "LOWBATT" }}🪫
          {{- else if eq .Event "FSD" }}🛑
          {{- else if eq .Event "REPLBATT" }}🔋
          {{- else if eq .Event "COMMBAD" }}📡
          {{- else if eq .Event "COMMOK" }}✅
          {{- else if eq .Event "NOCOMM" }}🚨
          {{- else if eq .Event "OVERLOAD" }}🔥
          {{- else if eq .Event "BYPASS" }}⚡
          {{- else if eq .Event "ALARM" }}⚠️
          {{- else if eq .Event "STARTUP" }}🚀
          {{- else }}⚙️
          {{- end }} {{ .Event }} ups={{.UPS}} status="{{.Status}}" charge={{.BatteryCharge}}% runtime={{.BatteryRuntime}}s load={{.UPSLoad}}%
      timeout: 5s

    # Immediate local poweroff when the UPS asserts FSD. Uses systemd's
    # logind D-Bus interface — the unprivileged ups-client user is granted
    # permission via the polkit rule init/ups-client-poweroff.rules
    # (install to /etc/polkit-1/rules.d/50-ups-client-poweroff.rules).
    # No sudo, no setuid wrapper.
    - name: poweroff
      command: /usr/bin/systemctl
      args: ["--no-block", "poweroff"]
      timeout: 10s
      events: [FSD]

  webhook:
    # ntfy.sh — see https://ntfy.sh/
    # Severity-tiered: urgent for FSD/NOCOMM, high for low-battery and faults,
    # default for transitions, low for routine recovery.
    - name: ntfy
      url: https://ntfy.sh/your-private-topic
      headers:
        # Notification icon shown in the ntfy Android/web client. Must be a
        # publicly-accessible image URL — ntfy.sh fetches it server-side.
        # Default is the battery emoji from Google's noto-emoji at 512×512
        # (the universal UPS symbol, transparent background, crisp on
        # xxxhdpi phones); swap for your own hosted image to taste.
        Icon: https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/512/emoji_u1f50b.png
        Title: >-
          {{- if eq .Event "ONLINE" }}🟢 UPS {{.UPS}} · back on mains
          {{- else if eq .Event "ONBATT" }}🔌 UPS {{.UPS}} · running on battery
          {{- else if eq .Event "LOWBATT" }}🪫 UPS {{.UPS}} · LOW BATTERY
          {{- else if eq .Event "FSD" }}🛑 UPS {{.UPS}} · forced shutdown
          {{- else if eq .Event "REPLBATT" }}🔋 UPS {{.UPS}} · replace battery
          {{- else if eq .Event "COMMBAD" }}📡 UPS {{.UPS}} · communication lost
          {{- else if eq .Event "COMMOK" }}✅ UPS {{.UPS}} · communication restored
          {{- else if eq .Event "NOCOMM" }}🚨 UPS {{.UPS}} · UNREACHABLE
          {{- else if eq .Event "OVERLOAD" }}🔥 UPS {{.UPS}} · OVERLOAD
          {{- else if eq .Event "NOTOVERLOAD" }}✅ UPS {{.UPS}} · overload cleared
          {{- else if eq .Event "BYPASS" }}⚡ UPS {{.UPS}} · bypass active
          {{- else if eq .Event "NOTBYPASS" }}✅ UPS {{.UPS}} · bypass cleared
          {{- else if eq .Event "ALARM" }}⚠️ UPS {{.UPS}} · alarm{{if .Alarm}}: {{.Alarm}}{{end}}
          {{- else if eq .Event "NOTALARM" }}✅ UPS {{.UPS}} · alarm cleared
          {{- else if eq .Event "STARTUP" }}🚀 UPS {{.UPS}} · ups-client started
          {{- else }}⚙️ UPS {{.UPS}} · {{.Event}}{{ end }}
        Priority: >-
          {{- if eq .Event "FSD" "NOCOMM" "OVERLOAD" }}urgent
          {{- else if eq .Event "LOWBATT" "REPLBATT" "ALARM" "ONBATT" "COMMBAD" "BYPASS" "OFF" }}high
          {{- else if eq .Event "STARTUP" }}low
          {{- else }}default{{ end }}
        Tags: >-
          {{- if eq .Event "ONLINE" }}green_circle,electric_plug
          {{- else if eq .Event "ONBATT" }}orange_circle,battery
          {{- else if eq .Event "LOWBATT" }}rotating_light,low_battery
          {{- else if eq .Event "FSD" }}rotating_light,zap
          {{- else if eq .Event "REPLBATT" }}wrench,battery
          {{- else if eq .Event "COMMBAD" }}satellite_antenna,warning
          {{- else if eq .Event "COMMOK" }}satellite_antenna,white_check_mark
          {{- else if eq .Event "NOCOMM" }}rotating_light,satellite_antenna
          {{- else if eq .Event "OVERLOAD" }}fire,warning
          {{- else if eq .Event "NOTOVERLOAD" }}white_check_mark
          {{- else if eq .Event "BYPASS" }}high_voltage,warning
          {{- else if eq .Event "NOTBYPASS" }}white_check_mark
          {{- else if eq .Event "ALARM" }}warning,bell
          {{- else if eq .Event "NOTALARM" }}white_check_mark,bell
          {{- else if eq .Event "STARTUP" }}rocket
          {{- else }}gear{{ end }}
      body: |-
        {{- if eq .Event "ONLINE" }}🟢 Mains power restored.
        {{- else if eq .Event "ONBATT" }}🔌 Now running on battery.
        {{- else if eq .Event "LOWBATT" }}🪫 Battery low — shutdown imminent.
        {{- else if eq .Event "FSD" }}🛑 Forced shutdown in progress.
        {{- else if eq .Event "REPLBATT" }}🔋 Battery health degraded — schedule replacement.
        {{- else if eq .Event "COMMBAD" }}📡 Lost communication with the UPS driver.
        {{- else if eq .Event "COMMOK" }}✅ Communication with the UPS restored.
        {{- else if eq .Event "NOCOMM" }}🚨 UPS still unreachable past the comm-loss threshold.
        {{- else if eq .Event "OVERLOAD" }}🔥 Output overload — shed load now.
        {{- else if eq .Event "NOTOVERLOAD" }}✅ Overload condition cleared.
        {{- else if eq .Event "BYPASS" }}⚡ UPS in bypass — load is unprotected.
        {{- else if eq .Event "NOTBYPASS" }}✅ Bypass cleared — load is protected again.
        {{- else if eq .Event "ALARM" }}⚠️ UPS reports an active alarm{{if .Alarm}}: {{.Alarm}}{{end}}.
        {{- else if eq .Event "NOTALARM" }}✅ UPS alarm cleared.
        {{- else if eq .Event "STARTUP" }}🚀 ups-client connected and monitoring.
        {{- else }}⚙️ {{ .Event }}{{ end }}

        ────────────────────────────
        🔋 Charge   {{ .BatteryCharge }}%
        ⏱  Runtime  {{ .BatteryRuntime }}s
        ⚖  Load     {{ .UPSLoad }}%
        🔌 Mains    {{ .InputVoltage }}V
        📊 Status   {{ .Status }}
        🕒 At       {{ .Time.Format "2006-01-02 15:04:05 MST" }}
      timeout: 5s

    # Home Assistant generic webhook (default JSON body, no template).
    - name: home-assistant
      url: https://ha.example/api/webhook/ups-events
      timeout: 5s

  ssh:
    - name: nas
      host: nas.lan
      port: 22
      user: ops
      private_key_file: /etc/ups-client/id_ed25519
      known_hosts_file: /etc/ups-client/known_hosts
      command: |
        logger -t ups "🔔 {{.Event}} on {{.UPS}} status={{.Status}} charge={{.BatteryCharge}}%"
        case "{{.Event}}" in
          ONBATT|LOWBATT|FSD) systemctl stop heavy-job.service ;;
          ONLINE)             systemctl start heavy-job.service ;;
        esac
      timeout: 10s
      events: [ONBATT, LOWBATT, FSD, ONLINE]

  telegram:
    # No parse_mode keeps the message tolerant of arbitrary characters in
    # status strings; switch to HTML or MarkdownV2 only if you need rich
    # formatting and accept the escaping headache.
    - name: ops
      bot_token: "123456:ABC-DEF"
      chat_id: "-1001234567890"
      message: |-
        {{- if eq .Event "ONLINE" }}🟢 UPS {{.UPS}} — back on mains
        {{- else if eq .Event "ONBATT" }}🔌 UPS {{.UPS}} — running on battery
        {{- else if eq .Event "LOWBATT" }}🪫 UPS {{.UPS}} — LOW BATTERY
        {{- else if eq .Event "FSD" }}🛑 UPS {{.UPS}} — forced shutdown imminent
        {{- else if eq .Event "REPLBATT" }}🔋 UPS {{.UPS}} — replace battery soon
        {{- else if eq .Event "COMMBAD" }}📡 UPS {{.UPS}} — communication lost
        {{- else if eq .Event "COMMOK" }}✅ UPS {{.UPS}} — communication restored
        {{- else if eq .Event "NOCOMM" }}🚨 UPS {{.UPS}} — UNREACHABLE
        {{- else if eq .Event "OVERLOAD" }}🔥 UPS {{.UPS}} — overload
        {{- else if eq .Event "BYPASS" }}⚡ UPS {{.UPS}} — bypass active
        {{- else if eq .Event "ALARM" }}⚠️ UPS {{.UPS}} — alarm{{if .Alarm}}: {{.Alarm}}{{end}}
        {{- else if eq .Event "STARTUP" }}🚀 UPS {{.UPS}} — ups-client started
        {{- else }}⚙️ UPS {{.UPS}} — {{.Event}}{{ end }}

        🔋 {{.BatteryCharge}}%   ⏱ {{.BatteryRuntime}}s   ⚖ {{.UPSLoad}}%   🔌 {{.InputVoltage}}V
        📊 {{.Status}}
      timeout: 5s
